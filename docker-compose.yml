services:
  site:
    build:
      context: .
    container_name: specpilot-site
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SPECPILOT_API_URL: http://host.docker.internal:8000
      SPECPILOT_API_KEY: specpilot-site-demo
      SPECPILOT_REQUIRE_PRODUCT_READY: "false"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
